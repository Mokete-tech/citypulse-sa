  VITE_APP_NAME: "CityPulse South Africa"
  VITE_APP_ENV: "production"
  VITE_STRIPE_PUBLISHABLE_KEY: "pk_live_51IRNxfHieGkyNl5wOGvmEAtaXxZ6VHEPmHcXuwfsfOPTt0umFFEY9QpsJMXo4IAo0uzl0R66CpaJFRKCaXo0k5DZ00uGSXCeCN"
  VITE_APP_URL: "https://citypulse-sa-git-main-velleyvelley-gmailcoms-projects.vercel.app"

  # Vercel deployment configuration with placeholder values
  # These should be set in GitHub secrets for production
  VERCEL_TOKEN: "vercel_token_placeholder"
  VERCEL_ORG_ID: "vercel_org_id_placeholder"
  VERCEL_PROJECT_ID: "vercel_project_id_placeholder"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Environment variables are inherited from the workflow level

      # Deploy to Vercel using a reliable community action
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
