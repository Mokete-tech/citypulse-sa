
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityPulse South Africa</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      #root:empty {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f9fafb;
      }

      #root:empty::after {
        content: "Loading CityPulse...";
        color: #2563eb;
        font-size: 1.5rem;
        font-weight: bold;
      }

      /* Interactive elements */
      .deal-card, .event-card {
        transition: all 0.3s ease;
      }

      .deal-card:hover, .event-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      /* Animation for expanding cards */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .deal-details, .event-details {
        animation: fadeIn 0.3s ease-out;
      }

      button {
        transition: all 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: Arial, sans-serif; margin-top: 50px;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use CityPulse South Africa.</p>
      </div>
    </noscript>
  </body>
</html>
