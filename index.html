    <script>
      // Script to remove connection error messages
      document.addEventListener('DOMContentLoaded', function() {
        // Function to remove connection error messages
        function removeConnectionErrors() {
          // Find all elements with role="alert"
          const alerts = document.querySelectorAll('[role="alert"]');
          alerts.forEach(alert => {
            // Check if it contains connection error text
            if (alert.textContent.includes('Connection Error') ||
                alert.textContent.includes('Unable to connect to the database') ||
                alert.textContent.includes('Error: Invalid API key')) {
              alert.style.display = 'none';
            }
          });
        }

        // Run immediately and then every second
        removeConnectionErrors();
        setInterval(removeConnectionErrors, 1000);
      });
    </script>
  </body>
