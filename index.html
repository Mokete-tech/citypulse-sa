
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityPulse South Africa - Local Deals & Events</title>
    <meta name="description" content="Discover the best local deals and events in South Africa with CityPulse" />
    <style>
      /* Basic styles to prevent layout shift */
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      /* Fallback loading state */
      #root:empty {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f9fafb;
      }

      #root:empty::after {
        content: "Loading CityPulse...";
        color: #0EA5E9;
        font-size: 1.5rem;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: Arial, sans-serif; margin-top: 50px;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use CityPulse South Africa.</p>
      </div>
    </noscript>
  </body>
</html>
