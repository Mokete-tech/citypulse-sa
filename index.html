
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityPulse South Africa - Local Deals & Events</title>
    <meta name="description" content="Discover the best local deals and events in South Africa with CityPulse" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0EA5E9" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://citypulse-sa.vercel.app/" />
    <meta property="og:title" content="CityPulse South Africa - Local Deals & Events" />
    <meta property="og:description" content="Discover the best local deals and events in South Africa with CityPulse" />
    <meta property="og:image" content="https://citypulse-sa.vercel.app/social-preview.jpg" />

    <style>
      /* Basic styles to prevent layout shift */
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      /* Fallback loading state */
      #root:empty {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f9fafb;
      }

      #root:empty::after {
        content: "Loading CityPulse...";
        color: #0EA5E9;
        font-size: 1.5rem;
        font-weight: bold;
      }

      /* Sidebar styles */
      .sidebar {
        transition: transform 0.3s ease !important;
        width: 256px !important;
      }

      body.sidebar-closed .sidebar {
        transform: translateX(-256px) !important;
      }

      .main-content {
        transition: margin-left 0.3s ease !important;
        margin-left: 256px !important;
      }

      body.sidebar-closed .main-content {
        margin-left: 0 !important;
      }

      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-256px) !important;
        }

        .main-content {
          margin-left: 0 !important;
        }

        body:not(.sidebar-closed) .sidebar {
          transform: translateX(0) !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Simple sidebar toggle script
      document.addEventListener('DOMContentLoaded', function() {
        try {
          // Initialize sidebar state from localStorage
          if (localStorage.getItem('sidebarClosed') === 'true') {
            document.body.classList.add('sidebar-closed');
          }

          // Add click event listener for sidebar toggle buttons
          document.addEventListener('click', function(event) {
            try {
              if (event.target.closest('[data-sidebar-toggle]') ||
                  event.target.closest('.sidebar-overlay')) {

                if (window.innerWidth <= 768) {
                  document.body.classList.toggle('sidebar-open');
                } else {
                  document.body.classList.toggle('sidebar-closed');
                }

                localStorage.setItem('sidebarClosed', document.body.classList.contains('sidebar-closed'));
              }
            } catch (e) {
              console.log('Error in sidebar toggle:', e);
            }
          });
        } catch (e) {
          console.log('Error initializing sidebar:', e);
        }
      });
    </script>
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: Arial, sans-serif; margin-top: 50px;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use CityPulse South Africa.</p>
      </div>
    </noscript>
  </body>
</html>
