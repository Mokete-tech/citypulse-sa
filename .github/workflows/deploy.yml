name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Define environment variables at the workflow level
env:
  # App configuration (non-sensitive)
  VITE_APP_NAME: "CityPulse South Africa"
  VITE_APP_ENV: "production"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Check if Supabase secrets are available
      - name: Check Supabase secrets
        id: check_supabase
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::warning::Missing Supabase secrets. Using default configuration."
            echo "has_supabase_secrets=false" >> $GITHUB_OUTPUT
          else
            echo "has_supabase_secrets=true" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: npm run build
        env:
          # Set Supabase environment variables if secrets are available
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # Check if required secrets are available
      - name: Check Vercel deployment secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::warning::Missing required Vercel deployment secrets. Please add VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID to your repository secrets."
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      # Deploy to Vercel using a reliable community action
      - name: Deploy to Vercel
        if: steps.check_secrets.outputs.skip_deploy != 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'

      # Provide instructions if deployment is skipped
      - name: Deployment skipped
        if: steps.check_secrets.outputs.skip_deploy == 'true'
        run: |
          echo "Vercel deployment was skipped due to missing secrets."
          echo "To deploy to Vercel, please add the following secrets to your repository:"
          echo "- VERCEL_TOKEN: Your Vercel API token"
          echo "- VERCEL_ORG_ID: Your Vercel organization ID"
          echo "- VERCEL_PROJECT_ID: Your Vercel project ID"
          echo "You can find these values in your Vercel account settings."

      # Summary of the workflow run
      - name: Workflow Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Supabase configuration status
          if [ "${{ steps.check_supabase.outputs.has_supabase_secrets }}" == "true" ]; then
            echo "✅ Supabase configuration: **Complete**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Supabase configuration: **Incomplete** - Using default configuration" >> $GITHUB_STEP_SUMMARY
            echo "To configure Supabase, add these secrets to your repository:" >> $GITHUB_STEP_SUMMARY
            echo "- SUPABASE_URL: Your Supabase project URL" >> $GITHUB_STEP_SUMMARY
            echo "- SUPABASE_ANON_KEY: Your Supabase anonymous key" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Vercel deployment status
          if [ "${{ steps.check_secrets.outputs.skip_deploy }}" == "true" ]; then
            echo "❌ Vercel deployment: **Skipped** - Missing required secrets" >> $GITHUB_STEP_SUMMARY
            echo "To enable Vercel deployment, add these secrets to your repository:" >> $GITHUB_STEP_SUMMARY
            echo "- VERCEL_TOKEN: Your Vercel API token" >> $GITHUB_STEP_SUMMARY
            echo "- VERCEL_ORG_ID: Your Vercel organization ID" >> $GITHUB_STEP_SUMMARY
            echo "- VERCEL_PROJECT_ID: Your Vercel project ID" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Vercel deployment: **Complete**" >> $GITHUB_STEP_SUMMARY
          fi
