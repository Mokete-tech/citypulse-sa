
<!doctype html>

    <meta charset="UTF-8" />
    <!-- Inline script to remove connection error immediately -->
    <script>
      // This script runs immediately and removes the connection error element
      (function() {
        // Monkey patch the DOM API to prevent error elements from being created
        try {
          // Override appendChild to prevent error elements from being added to the DOM
          const originalAppendChild = Node.prototype.appendChild;
          Node.prototype.appendChild = function(child) {
            // Check if this is a div with error content
            if (child && child.nodeType === 1 && child.tagName === 'DIV') {
              // Check if it has role="alert"
              if (child.getAttribute && child.getAttribute('role') === 'alert') {
                console.log('Blocked alert element from being added to DOM');
                return child; // Return without actually appending
              }

              // Check if it contains error text
              if (child.textContent && (
                  child.textContent.includes('Connection Error') ||
                  child.textContent.includes('Unable to connect') ||
                  child.textContent.includes('Error: Invalid API key') ||
                  child.textContent.includes('Try Again') ||
                  child.textContent.includes('Open Supabase Dashboard')
                )) {
                console.log('Blocked error element from being added to DOM');
                return child; // Return without actually appending
              }
            }

            // Check if this is a text node with error content
            if (child && child.nodeType === 3 && child.textContent) {
              const text = child.textContent;
              if (
                text.includes('Connection Error') ||
                text.includes('Unable to connect') ||
                text.includes('Error: Invalid API key') ||
                text.includes('Try Again') ||
                text.includes('Open Supabase Dashboard')
              ) {
                console.log('Blocked error text from being added to DOM');
                return child; // Return without actually appending
              }
            }

            // Otherwise, proceed normally
            return originalAppendChild.call(this, child);
          };

          // Override insertBefore to prevent error elements from being added to the DOM
          const originalInsertBefore = Node.prototype.insertBefore;
          Node.prototype.insertBefore = function(newNode, referenceNode) {
            // Check if this is a div with error content
            if (newNode && newNode.nodeType === 1 && newNode.tagName === 'DIV') {
              // Check if it has role="alert"
              if (newNode.getAttribute && newNode.getAttribute('role') === 'alert') {
                console.log('Blocked alert element from being inserted into DOM');
                return newNode; // Return without actually inserting
              }

              // Check if it contains error text
              if (newNode.textContent && (
                  newNode.textContent.includes('Connection Error') ||
                  newNode.textContent.includes('Unable to connect') ||
                  newNode.textContent.includes('Error: Invalid API key') ||
                  newNode.textContent.includes('Try Again') ||
                  newNode.textContent.includes('Open Supabase Dashboard')
                )) {
                console.log('Blocked error element from being inserted into DOM');
                return newNode; // Return without actually inserting
              }
            }

            // Otherwise, proceed normally
            return originalInsertBefore.call(this, newNode, referenceNode);
          };
        } catch (e) {
          console.error('Failed to patch DOM API', e);
        }

        function removeConnectionError() {
          // Try to find the connection error element by its content
          const elements = document.querySelectorAll('div');
          for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            if (element.textContent &&
                (element.textContent.includes('Connection Error') ||
                 element.textContent.includes('Unable to connect') ||
                 element.textContent.includes('Error: Invalid API key') ||
                 element.textContent.includes('Try Again') ||
                 element.textContent.includes('Open Supabase Dashboard'))) {

              // Found the connection error element, remove it
              if (element.parentNode) {
                try {
                  element.parentNode.removeChild(element);
                  console.log('Removed connection error element');
                } catch (e) {}
              }
            }
          }

          // Also try to find elements by role="alert"
          const alerts = document.querySelectorAll('[role="alert"]');
          for (let i = 0; i < alerts.length; i++) {
            const alert = alerts[i];
            if (alert.parentNode) {
              try {
                alert.parentNode.removeChild(alert);
                console.log('Removed alert element');
              } catch (e) {}
            }
          }
        }

        // Run immediately
        removeConnectionError();

        // Set up to run again when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
          removeConnectionError();

          // Run every 50ms indefinitely
          setInterval(removeConnectionError, 50);
        });
      })();
    </script>

  <body>
    <div id="root"></div>
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Immediately execute before DOM is fully loaded
      (function() {
        function hideErrors() {
          // Find and remove connection error elements
          const errorTexts = [
            'Connection Error',
            'Unable to connect',
            'Invalid API key',
            'Try Again',
            'Open Supabase Dashboard',
            'Failed to load',
            'Error:',
            'error',
            'Unable to',
            'Cannot',
            'Failed',
            'Supabase',
            'database',
            'API key',
            'Dashboard'
          ];

          // Function to check if element contains any error text
          function containsErrorText(element) {
            if (!element || !element.textContent) return false;
            return errorTexts.some(text => element.textContent.includes(text));
          }

          // Function to hide element
          function hideElement(element) {
            if (!element) return;
            element.style.display = 'none';
            element.style.visibility = 'hidden';
            element.style.opacity = '0';
            element.style.height = '0';
            element.style.width = '0';
            element.style.position = 'absolute';
            element.style.pointerEvents = 'none';
            element.style.overflow = 'hidden';
            element.style.clip = 'rect(0, 0, 0, 0)';

            // Also try to remove it
            try {
              if (element.parentNode) {
                element.parentNode.removeChild(element);
              }
            } catch (e) {}
          }

          // Hide all alert elements
          document.querySelectorAll('[role="alert"]').forEach(hideElement);

          // Find all elements and check their text content
          document.querySelectorAll('*').forEach(element => {
            if (containsErrorText(element)) {
              // Try to find the parent container
              let container = element;
              for (let i = 0; i < 5; i++) { // Check up to 5 levels up
                if (container.parentNode && container.parentNode !== document.body) {
                  container = container.parentNode;
                } else {
                  break;
                }
              }
              hideElement(container);
            }
          });
        }

        // Run immediately
        hideErrors();

        // Run again when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
          hideErrors();

          // Run every 100ms for the first 5 seconds
          let count = 0;
          const interval = setInterval(function() {
            hideErrors();
            count++;
            if (count >= 50) clearInterval(interval);
          }, 100);

          // Also run when DOM changes
          const observer = new MutationObserver(function(mutations) {
            hideErrors();
          });

          observer.observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            characterData: true
          });

          // Run every second indefinitely
          setInterval(hideErrors, 1000);
        });
      })();
    </script>
